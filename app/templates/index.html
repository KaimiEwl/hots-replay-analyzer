<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>HOTS Replay Analyzer</title>
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div class="brand">
          <div class="brand-mark">H</div>
          <span>HOTS Replay Analyzer</span>
        </div>
        <a class="ghost-link" href="https://github.com/KaimiEwl/hots-replay-analyzer">GitHub</a>
      </header>

      <section class="tool-panel">
        <div class="headline">
          <h1>Загрузите реплей. Получите разбор.</h1>
          <p>Сервис разберет Heroes of the Storm replay, покажет главные ошибки матча и даст понятные советы, что исправить в следующей игре.</p>
        </div>

        <form class="upload-box" action="/upload" method="post" enctype="multipart/form-data">
          <div class="upload-target">
            <input class="file-input" type="file" name="file" accept=".StormReplay" required>
            <button class="primary-button" type="submit">Разобрать реплей</button>
            <p class="fineprint">Максимальный размер файла: 64 MB. Отчет хранится по приватной случайной ссылке на этом сервере.</p>
          </div>
        </form>
      </section>
    </main>
  </body>
</html>
